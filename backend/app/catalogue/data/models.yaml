- id: yolo-segmentation
  nom: "YOLOv8 (segmentation)"
  famille: vision_segmentation
  secteur: BTP / Agriculture — mesure de surface
  moteur: ultralytics
  moteur_ref: yolov8n-seg.pt
  taille: "3.4 millions de paramètres"
  description_pedagogique: >
    Contrairement à la détection (un simple rectangle autour de l'objet), la segmentation
