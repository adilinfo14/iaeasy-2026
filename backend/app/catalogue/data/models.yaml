        société Immo Conseil SAS, et de Laura Mercier, représentante des copropriétaires du quartier Chartrons.
    - label: Note de service RH
      input: À compter du 3 novembre, Thomas Girard prendra la direction de l'agence de Lille, en remplacement
        de Camille Roy, qui rejoint le siège social à Nantes chez Bâti Services.
    idees_usage:
    - Extraire automatiquement les noms des parties dans des centaines de contrats pour alimenter une
