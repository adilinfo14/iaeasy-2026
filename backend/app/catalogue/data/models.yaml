    - Repérer les organisations et dates citées dans des rapports d'audit pour accélérer leur classement.
    - Constituer un annuaire des intervenants (personnes, entreprises, villes) à partir de comptes-rendus
      de réunions.
    - Anonymiser des documents RH en repérant automatiquement les noms de personnes à masquer.
    - Identifier rapidement les lieux et sociétés mentionnés dans des dépêches d'actualité pour une revue
      de presse.
  statut: disponible
  lien_telechargement: https://huggingface.co/Jean-Baptiste/camembert-ner
  mode_emploi: pip install transformers torch, puis charger avec `AutoModelForTokenClassification.from_pretrained("Jean-Baptiste/camembert-ner")`
    (+ le tokenizer associé). Les poids sont téléchargés automatiquement au premier lancement et mis en
    cache localement (~/.cache/huggingface).
- id: camembert-qa
  nom: CamemBERT Question-Réponse
  famille: question_reponse
  secteur: Support client / documentation
  moteur: transformers
  moteur_ref: etalab-ia/camembert-base-squadFR-fquad-piaf
  taille: 110 millions de paramètres
  description_pedagogique: 'Un modèle de question-réponse extractive : il ne invente pas de réponse, il
    repère le passage exact d''un texte de référence qui répond à la question posée. Très différent d''un
    LLM qui, lui, reformule et peut inventer — ici la réponse est toujours un extrait vérifiable du contexte
    fourni.

    '
  cas_usage:
    enonce: Répondre à une question en repérant le passage exact dans un texte de référence.
    exemples:
    - label: Conditions de garantie
      input: 'Contexte : La garantie couvre les défauts de matériaux pendant 2 ans à compter de la date
        d''achat. Elle ne couvre pas les dommages causés par une mauvaise utilisation. Question : Combien
        de temps dure la garantie ?'
    - label: Horaires
      input: 'Contexte : Le service client est joignable du lundi au vendredi de 9h à 18h, sauf les jours
        fériés. Le samedi, seul le support en ligne est disponible. Question : Le service client répond-il
