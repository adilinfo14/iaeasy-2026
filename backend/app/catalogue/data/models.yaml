    de mesurer une surface réelle (une toiture, une parcelle) plutôt que juste repérer une présence.
  cas_usage:
    enonce: "Segmenter précisément chaque objet de l'image d'exemple (contour, pas juste un rectangle)."
    exemples: []
  statut: disponible

