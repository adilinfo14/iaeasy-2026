- id: scoring-pret-immobilier
  nom: "Arbre de décision — scoring prêt immobilier"
  famille: classification_classique
  secteur: Banque — crédit immobilier
  moteur: sklearn
  moteur_ref: entraîné en direct (arbre de décision)
  taille: "algorithme classique, pas un réseau de neurones"
  description_pedagogique: >
    Un autre algorithme "classique" que la régression logistique du scoring crédit : un
