- id: llama3-generaliste
  nom: Llama 3.2 (3B)
  famille: llm_generatif
  secteur: Généraliste
  moteur: ollama
  moteur_ref: llama3.2:3b
  taille: 3 milliards de paramètres
  description_pedagogique: 'Un modèle de langage génératif : il prédit le mot suivant, un par un, à partir
    de tout le texte déjà écrit avant lui. Sa taille réduite (3B) le rend rapide même sans carte graphique,
    au prix d''un raisonnement moins fin qu''un très gros modèle.

    '
  cas_usage:
    enonce: Demander une explication simple d'un concept, comme le ferait un assistant généraliste.
    exemples:
    - label: Explication scolaire
      input: Explique en 3 phrases ce qu'est la photosynthèse, pour un collégien.
    - label: Reformulation professionnelle
      input: 'Reformule cette phrase de façon plus polie : ''vous devez payer maintenant sinon on arrête
        tout''.'
    - label: Idée créative
      input: Propose 3 noms originaux pour une nouvelle marque de café bio.
    - label: Réponse à un avis client
      input: 'Écris une réponse courte et polie à cet avis Google 2 étoiles : ''Livraison en retard et
        produit abîmé, très déçu.'''
    - label: Résumé de cours
      input: Résume en 5 lignes maximum les causes de la Révolution française, pour réviser avant un contrôle.
    idees_usage:
    - Un artisan répond rapidement à un avis client mécontent laissé sur Google.
    - Une association rédige une courte annonce pour un événement de quartier.
    - Un étudiant demande un résumé en 5 lignes d'un chapitre avant un contrôle.
    - Un commerçant reformule une affiche de promotion pour la rendre plus claire.
    - Une collectivité simplifie un communiqué administratif pour les habitants.
  statut: disponible
  lien_telechargement: https://ollama.com/library/llama3.2
  mode_emploi: Installez Ollama (ollama.com/download), puis lancez `ollama pull llama3.2:3b` dans un terminal
    — le modèle est ensuite utilisable avec `ollama run llama3.2:3b` en ligne de commande, ou via l'API
    locale http://localhost:11434/api/generate depuis n'importe quel langage.
- id: qwen-raisonnement
  nom: Qwen 2.5 Instruct (7B)
  famille: llm_generatif
  secteur: Raisonnement / généraliste renforcé
  moteur: ollama
  moteur_ref: qwen2.5:7b-instruct
  taille: 7 milliards de paramètres
  description_pedagogique: 'Même famille de modèle que Llama (génératif, mot par mot), mais plus gros
    : il suit mieux des instructions précises et enchaîne plusieurs étapes de raisonnement. C''est aussi
    le modèle utilisé plus loin pour la brique "agent" (il sait appeler des outils).

    '
  cas_usage:
    enonce: Résoudre un petit problème en plusieurs étapes.
    exemples:
    - label: Calcul de facturation
      input: Un artisan facture 45€/heure. Il a travaillé 3h30 lundi et 2h15 mardi. Calcule le total facturé,
        étape par étape.
    - label: Logique
      input: J'ai 3 boîtes. La rouge contient 2 fois plus de billes que la bleue. La verte en contient
        5 de moins que la rouge. Il y a 45 billes au total. Combien y en a-t-il dans chaque boîte ?
    - label: Comparaison argumentée
      input: Compare en 4 points les avantages et inconvénients du télétravail pour une PME de 10 salariés.
    - label: Comparaison de devis
      input: 'Trois fournisseurs proposent : A) 120€ + 15€/unité, B) 200€ forfait pour 10 unités max puis
        10€/unité, C) 8€/unité sans forfait. Pour une commande de 25 unités, calcule le coût de chaque
        option étape par étape et indique la moins chère.'
    - label: Répartition de budget
      input: 'Une association reçoit une subvention de 8000€ à répartir : 40% pour le matériel, 35% pour
        la communication, le reste pour les frais de déplacement. Calcule chaque montant et vérifie que
        le total correspond bien à 8000€.'
    idees_usage:
    - Un indépendant compare plusieurs devis fournisseurs pour trouver le moins cher étape par étape.
    - Une association répartit un budget de subvention entre plusieurs postes de dépense selon des règles
      précises.
    - Un développeur fait vérifier la logique d'un algorithme décrit en français avant de le coder.
    - Un étudiant en gestion calcule un seuil de rentabilité pas à pas.
    - Une collectivité structure une note de synthèse à partir de plusieurs contraintes réglementaires.
  statut: disponible
  lien_telechargement: https://ollama.com/library/qwen2.5
  mode_emploi: Installez Ollama (ollama.com/download), puis lancez `ollama pull qwen2.5:7b-instruct` dans
    un terminal — le modèle est ensuite utilisable avec `ollama run qwen2.5:7b-instruct` en ligne de commande,
    ou via l'API locale http://localhost:11434/api/generate depuis n'importe quel langage.
- id: deepseek-code
  nom: DeepSeek Coder (6.7B)
  famille: llm_generatif
  secteur: Code / développement
  moteur: ollama
  moteur_ref: deepseek-coder:6.7b
  taille: 6.7 milliards de paramètres
  description_pedagogique: 'Un modèle génératif spécialisé : entraîné en majorité sur du code source plutôt
    que sur du texte généraliste. Il illustre l''idée de "spécialisation par les données d''entraînement"
    plutôt que par l''architecture elle-même.

    '
  cas_usage:
    enonce: Générer une petite fonction à partir d'une description en français.
    exemples:
    - label: Fonction mathématique
      input: Écris une fonction Python qui vérifie si un nombre est premier.
    - label: Manipulation de données
      input: Écris une fonction Python qui prend une liste de prix TTC et renvoie la liste des prix HT
        (TVA 20%).
    - label: Débogage
      input: 'Corrige ce code Python qui plante : def moyenne(l): return sum(l)/len(l) -- appelé avec
        une liste vide.'
    - label: Script de renommage de fichiers
      input: Écris un script Python qui renomme tous les fichiers PDF d'un dossier au format 'facture_AAAA-MM-JJ.pdf'
        à partir de leur date de création.
    - label: Fonction de tri personnalisé
      input: Écris une fonction Python qui trie une liste de dictionnaires représentant des clients par
        ordre alphabétique de nom de famille.
    idees_usage:
    - Un développeur freelance génère un script de nettoyage de fichiers CSV avant import dans un outil
      de facturation.
    - Un artisan demande à un ami développeur d'automatiser le calcul de marges sur ses devis via un petit
      script.
    - Un étudiant en informatique demande un exemple de fonction pour s'entraîner à la récursivité.
    - Une petite entreprise génère un script pour renommer automatiquement des fichiers de factures.
    - Un développeur fait relire un algorithme de tri pour repérer une erreur de logique.
  statut: disponible
  lien_telechargement: https://ollama.com/library/deepseek-coder
  mode_emploi: Installez Ollama (ollama.com/download), puis lancez `ollama pull deepseek-coder:6.7b` dans
    un terminal — le modèle est ensuite utilisable avec `ollama run deepseek-coder:6.7b` en ligne de commande,
    ou via l'API locale http://localhost:11434/api/generate depuis n'importe quel langage.
- id: nomic-embeddings
  nom: Nomic Embed Text
  famille: embeddings
  secteur: Recherche sémantique / RAG
  moteur: ollama
  moteur_ref: nomic-embed-text
  taille: 137 millions de paramètres
  description_pedagogique: 'Ce modèle ne génère pas de texte : il transforme une phrase en une liste de
    nombres (un "vecteur") qui capture son sens. Deux phrases proches en sens ont des vecteurs proches.
    C''est la brique de base de la recherche sémantique et du RAG (module 3).

    '
  cas_usage:
    enonce: Comparer le sens de deux phrases via la similarité de leurs vecteurs.
    exemples:
    - label: Synonymes
      input: 'Phrase A: le chat dort sur le canapé. Phrase B: un félin fait la sieste sur le sofa.'
    - label: Sens opposé
      input: 'Phrase A: le client est très satisfait du service. Phrase B: le client est furieux et veut
        être remboursé.'
    - label: Sans rapport
      input: 'Phrase A: la réunion est reportée à demain. Phrase B: il pleut fort sur la côte bretonne.'
    - label: Question RH reformulée
      input: 'Phrase A: comment poser mes congés payés ? Phrase B: quelle est la procédure pour demander
        des vacances ?'
    - label: Actualités sans rapport
      input: 'Phrase A: la banque centrale relève ses taux d''intérêt. Phrase B: l''équipe locale a gagné
        le match hier soir.'
    idees_usage:
    - 'Recherche documentaire : retrouver les passages d''un manuel technique pertinents pour répondre
      à une question posée en langage naturel.'
    - 'RAG d''entreprise : alimenter un assistant qui va chercher les bons extraits d''une base de connaissances
      avant de rédiger sa réponse.'
    - 'Détection de doublons : identifier les tickets de support qui posent la même question avec des
      formulations différentes.'
    - 'Regroupement de tickets : classer automatiquement des avis clients par thème (livraison, prix,
      SAV) sans dictionnaire de mots-clés.'
    - 'Veille : rapprocher des articles de presse qui parlent du même événement malgré des titres très
      différents.'
  statut: disponible
  lien_telechargement: https://ollama.com/library/nomic-embed-text
  mode_emploi: Installez Ollama (ollama.com/download), lancez `ollama pull nomic-embed-text`, puis appelez-le
    via l'API locale (`curl http://localhost:11434/api/embeddings -d '{"model":"nomic-embed-text","prompt":"votre
    texte"}'`) ou la bibliothèque Python `ollama`.
- id: mxbai-embeddings
  nom: Mxbai Embed Large
  famille: embeddings
  secteur: Recherche sémantique (comparatif)
  moteur: ollama
  moteur_ref: mxbai-embed-large
  taille: 335 millions de paramètres
  description_pedagogique: 'Le même principe que Nomic Embed (transformer une phrase en vecteur), mais
    un modèle différent et plus gros. En comparant les deux sur la même paire de phrases, on voit que
    deux modèles d''embeddings ne donnent pas exactement le même score de similarité — il n''existe pas
    "un seul bon vecteur", chaque modèle a appris sa propre représentation.

    '
  cas_usage:
    enonce: Comparer le sens de deux phrases via la similarité de leurs vecteurs (à comparer avec Nomic
      Embed).
    exemples:
    - label: Synonymes
      input: 'Phrase A: le chat dort sur le canapé. Phrase B: un félin fait la sieste sur le sofa.'
    - label: Sens opposé
      input: 'Phrase A: le client est très satisfait du service. Phrase B: le client est furieux et veut
        être remboursé.'
    - label: Recommandation de lecture
      input: 'Phrase A: je cherche un livre qui parle de voyage dans le temps. Phrase B: peux-tu me conseiller
        un roman de science-fiction sur les voyages temporels ?'
    - label: Sujets sans lien
      input: 'Phrase A: les prix de l''énergie augmentent cet hiver. Phrase B: le chien du voisin aboie
        toute la nuit.'
    idees_usage:
    - 'RAG documentaire : tester si un modèle plus gros améliore la pertinence des passages retrouvés
      dans une base volumineuse.'
    - 'Recherche interne : comparer la qualité des résultats de recherche sémantique avant de choisir
      le modèle à mettre en production.'
    - 'Détection de doublons : vérifier si les doublons de tickets repérés par un petit modèle sont confirmés
      par un modèle plus précis.'
    - 'Modération de contenu : repérer des messages qui reformulent un contenu interdit avec un vocabulaire
      différent.'
    - 'Benchmark interne : évaluer plusieurs modèles d''embeddings sur des phrases métier avant d''arbitrer
      un choix d''infrastructure.'
  statut: disponible
  lien_telechargement: https://ollama.com/library/mxbai-embed-large
  mode_emploi: Installez Ollama (ollama.com/download), lancez `ollama pull mxbai-embed-large`, puis appelez-le
    via l'API locale (`curl http://localhost:11434/api/embeddings -d '{"model":"mxbai-embed-large","prompt":"votre
    texte"}'`) ou la bibliothèque Python `ollama`.
- id: camembert-sentiment
  nom: CamemBERT (sentiment FR)
  famille: classification_texte
  secteur: Assurance / Banque — analyse de retours clients
  moteur: transformers
  moteur_ref: cmarkea/distilcamembert-base-sentiment
  taille: 68 millions de paramètres (distillé)
  description_pedagogique: 'Contrairement aux modèles génératifs, un encodeur comme CamemBERT ne "rédige"
    rien : il lit un texte en entier puis rend une seule étiquette (ici une note de 1 à 5 étoiles). Modèle
    souverain français (Inria/CNRS), beaucoup plus rapide et léger qu''un LLM pour cette tâche précise
    — utile pour trier des avis clients ou des réclamations d''assurance.

    '
  cas_usage:
    enonce: Classer le sentiment d'un avis client (sortie sous forme de note en étoiles).
    exemples:
    - label: Avis positif
      input: Le sinistre a été traité en 48h, un conseiller très clair, je recommande.
    - label: Avis négatif
      input: Trois relances sans réponse, dossier toujours bloqué, très déçu.
    - label: Avis mitigé
      input: Le prix est correct mais le délai de traitement est vraiment trop long.
    - label: Avis très positif sur un logement
      input: L'appartement était impeccable, exactement conforme aux photos, et l'hôte a répondu à toutes
        nos questions en quelques minutes.
    - label: Réclamation neutre à négative
      input: Le colis est arrivé avec deux jours de retard et l'emballage était abîmé, mais le produit
        fonctionne normalement.
    idees_usage:
    - Prioriser automatiquement les tickets de support en repérant les messages les plus négatifs à traiter
      en urgence.
    - Suivre l'évolution mensuelle de la satisfaction sur les avis Google d'un réseau d'agences.
    - Alerter un community manager quand un commentaire très négatif est posté sur les réseaux sociaux.
    - Filtrer les réponses à une enquête de satisfaction interne pour cibler les équipes en difficulté.
    - Comparer la tonalité des retours entre deux versions d'une application avant et après une mise à
      jour.
  statut: disponible
  lien_telechargement: https://huggingface.co/cmarkea/distilcamembert-base-sentiment
  mode_emploi: pip install transformers torch, puis charger avec `AutoModelForSequenceClassification.from_pretrained("cmarkea/distilcamembert-base-sentiment")`
    (+ le tokenizer associé). Les poids sont téléchargés automatiquement au premier lancement et mis en
    cache localement (~/.cache/huggingface).
- id: helsinki-traduction
  nom: Helsinki-NLP OPUS-MT (FR→EN)
  famille: traduction
  secteur: International / export
  moteur: transformers
  moteur_ref: Helsinki-NLP/opus-mt-fr-en
  taille: 77 millions de paramètres
