- id: llama3-generaliste
  nom: "Llama 3.2 (3B)"
  famille: llm_generatif
  secteur: Généraliste
  moteur: ollama
  moteur_ref: llama3.2:3b
  taille: "3 milliards de paramètres"
  description_pedagogique: >
    Un modèle de langage génératif : il prédit le mot suivant, un par un, à partir de tout
    le texte déjà écrit avant lui. Sa taille réduite (3B) le rend rapide même sans carte
    graphique, au prix d'un raisonnement moins fin qu'un très gros modèle.
  cas_usage:
    enonce: "Demander une explication simple d'un concept, comme le ferait un assistant généraliste."
    exemples:
      - label: "Explication scolaire"
        input: "Explique en 3 phrases ce qu'est la photosynthèse, pour un collégien."
      - label: "Reformulation professionnelle"
        input: "Reformule cette phrase de façon plus polie : 'vous devez payer maintenant sinon on arrête tout'."
      - label: "Idée créative"
        input: "Propose 3 noms originaux pour une nouvelle marque de café bio."
  statut: disponible

- id: qwen-raisonnement
  nom: "Qwen 2.5 Instruct (7B)"
  famille: llm_generatif
  secteur: Raisonnement / généraliste renforcé
  moteur: ollama
  moteur_ref: qwen2.5:7b-instruct
  taille: "7 milliards de paramètres"
  description_pedagogique: >
    Même famille de modèle que Llama (génératif, mot par mot), mais plus gros : il suit
    mieux des instructions précises et enchaîne plusieurs étapes de raisonnement. C'est
    aussi le modèle utilisé plus loin pour la brique "agent" (il sait appeler des outils).
  cas_usage:
    enonce: "Résoudre un petit problème en plusieurs étapes."
    exemples:
      - label: "Calcul de facturation"
        input: "Un artisan facture 45€/heure. Il a travaillé 3h30 lundi et 2h15 mardi. Calcule le total facturé, étape par étape."
      - label: "Logique"
        input: "J'ai 3 boîtes. La rouge contient 2 fois plus de billes que la bleue. La verte en contient 5 de moins que la rouge. Il y a 45 billes au total. Combien y en a-t-il dans chaque boîte ?"
      - label: "Comparaison argumentée"
        input: "Compare en 4 points les avantages et inconvénients du télétravail pour une PME de 10 salariés."
  statut: disponible

- id: deepseek-code
  nom: "DeepSeek Coder (6.7B)"
  famille: llm_generatif
  secteur: Code / développement
  moteur: ollama
  moteur_ref: deepseek-coder:6.7b
  taille: "6.7 milliards de paramètres"
  description_pedagogique: >
    Un modèle génératif spécialisé : entraîné en majorité sur du code source plutôt que
    sur du texte généraliste. Il illustre l'idée de "spécialisation par les données
    d'entraînement" plutôt que par l'architecture elle-même.
  cas_usage:
    enonce: "Générer une petite fonction à partir d'une description en français."
    exemples:
      - label: "Fonction mathématique"
        input: "Écris une fonction Python qui vérifie si un nombre est premier."
      - label: "Manipulation de données"
        input: "Écris une fonction Python qui prend une liste de prix TTC et renvoie la liste des prix HT (TVA 20%)."
      - label: "Débogage"
        input: "Corrige ce code Python qui plante : def moyenne(l): return sum(l)/len(l) -- appelé avec une liste vide."
  statut: disponible

- id: nomic-embeddings
  nom: "Nomic Embed Text"
  famille: embeddings
  secteur: Recherche sémantique / RAG
  moteur: ollama
  moteur_ref: nomic-embed-text
  taille: "137 millions de paramètres"
  description_pedagogique: >
    Ce modèle ne génère pas de texte : il transforme une phrase en une liste de nombres
    (un "vecteur") qui capture son sens. Deux phrases proches en sens ont des vecteurs
    proches. C'est la brique de base de la recherche sémantique et du RAG (module 3).
  cas_usage:
    enonce: "Comparer le sens de deux phrases via la similarité de leurs vecteurs."
    exemples:
      - label: "Synonymes"
        input: "Phrase A: le chat dort sur le canapé. Phrase B: un félin fait la sieste sur le sofa."
      - label: "Sens opposé"
        input: "Phrase A: le client est très satisfait du service. Phrase B: le client est furieux et veut être remboursé."
      - label: "Sans rapport"
        input: "Phrase A: la réunion est reportée à demain. Phrase B: il pleut fort sur la côte bretonne."
  statut: disponible

- id: mxbai-embeddings
  nom: "Mxbai Embed Large"
  famille: embeddings
  secteur: Recherche sémantique (comparatif)
  moteur: ollama
  moteur_ref: mxbai-embed-large
  taille: "335 millions de paramètres"
  description_pedagogique: >
    Le même principe que Nomic Embed (transformer une phrase en vecteur), mais un modèle
    différent et plus gros. En comparant les deux sur la même paire de phrases, on voit
    que deux modèles d'embeddings ne donnent pas exactement le même score de similarité —
    il n'existe pas "un seul bon vecteur", chaque modèle a appris sa propre représentation.
  cas_usage:
    enonce: "Comparer le sens de deux phrases via la similarité de leurs vecteurs (à comparer avec Nomic Embed)."
    exemples:
      - label: "Synonymes"
        input: "Phrase A: le chat dort sur le canapé. Phrase B: un félin fait la sieste sur le sofa."
      - label: "Sens opposé"
        input: "Phrase A: le client est très satisfait du service. Phrase B: le client est furieux et veut être remboursé."
  statut: disponible

- id: camembert-sentiment
  nom: "CamemBERT (sentiment FR)"
  famille: classification_texte
  secteur: Assurance / Banque — analyse de retours clients
  moteur: transformers
  moteur_ref: cmarkea/distilcamembert-base-sentiment
  taille: "68 millions de paramètres (distillé)"
  description_pedagogique: >
    Contrairement aux modèles génératifs, un encodeur comme CamemBERT ne "rédige" rien :
    il lit un texte en entier puis rend une seule étiquette (ici une note de 1 à 5 étoiles).
    Modèle souverain français (Inria/CNRS), beaucoup plus rapide et léger qu'un LLM pour
    cette tâche précise — utile pour trier des avis clients ou des réclamations d'assurance.
  cas_usage:
    enonce: "Classer le sentiment d'un avis client (sortie sous forme de note en étoiles)."
    exemples:
      - label: "Avis positif"
        input: "Le sinistre a été traité en 48h, un conseiller très clair, je recommande."
      - label: "Avis négatif"
        input: "Trois relances sans réponse, dossier toujours bloqué, très déçu."
      - label: "Avis mitigé"
        input: "Le prix est correct mais le délai de traitement est vraiment trop long."
  statut: disponible

- id: helsinki-traduction
  nom: "Helsinki-NLP OPUS-MT (FR→EN)"
  famille: traduction
  secteur: International / export
  moteur: transformers
  moteur_ref: Helsinki-NLP/opus-mt-fr-en
  taille: "77 millions de paramètres"
  description_pedagogique: >
    Un modèle de traduction dédié à une seule paire de langues (français vers anglais).
    Beaucoup plus petit et rapide qu'un LLM généraliste utilisé pour traduire, car il n'a
    qu'une seule tâche à apprendre.
  cas_usage:
    enonce: "Traduire une phrase professionnelle du français vers l'anglais."
    exemples:
      - label: "Devis"
        input: "Veuillez trouver ci-joint le devis signé pour la rénovation de la toiture."
      - label: "Relance client"
        input: "Nous vous rappelons que votre facture est en attente de règlement depuis 15 jours."
      - label: "Email commercial"
        input: "Nous serions ravis de vous présenter notre nouvelle gamme de produits lors d'un rendez-vous."
  statut: disponible

- id: barthez-resume
  nom: "T5 (résumé automatique FR)"
  famille: resume_automatique
  secteur: Presse / veille documentaire
  moteur: transformers
  moteur_ref: plguillou/t5-base-fr-sum-cnndm
  taille: "220 millions de paramètres"
  description_pedagogique: >
    Comme la traduction, le résumé est une tâche "texte vers texte" : le modèle lit un
    texte long et en génère un plus court qui garde l'essentiel. Ce modèle est un T5
    (même famille d'architecture que beaucoup de LLM actuels) fine-tuné spécifiquement
    sur des articles de presse français pour cette tâche.
  cas_usage:
    enonce: "Résumer un texte en une ou deux phrases."
    exemples:
      - label: "Article économique"
        input: "L'entreprise a annoncé une hausse de 12% de son chiffre d'affaires au troisième trimestre, portée par les ventes en ligne. La direction évoque un contexte favorable malgré l'inflation, et prévoit d'ouvrir 5 nouveaux points de vente en région parisienne d'ici la fin de l'année. Les syndicats restent toutefois prudents sur les créations d'emplois annoncées."
      - label: "Compte-rendu de réunion"
        input: "Lors de la réunion du 12 juin, l'équipe a validé le nouveau planning de livraison pour le chantier de la rue des Lilas. Le retard de trois semaines sur le gros œuvre a été discuté et un plan de rattrapage a été proposé, avec un renfort d'équipe à partir du 20 juin. Le client a été informé et a accepté le nouveau délai."
  statut: disponible

- id: camembert-ner
  nom: "CamemBERT NER"
  famille: extraction_entites
  secteur: Juridique / RH — extraction d'informations
  moteur: transformers
  moteur_ref: Jean-Baptiste/camembert-ner
  taille: "110 millions de paramètres"
  description_pedagogique: >
    Un encodeur spécialisé dans la reconnaissance d'entités nommées (NER) : il repère et
    catégorise les personnes, lieux, organisations et dates dans un texte, sans jamais
    rien générer. Utile pour extraire automatiquement des informations structurées d'un
    contrat, d'un CV ou d'un compte-rendu.
  cas_usage:
    enonce: "Extraire les entités nommées (personnes, lieux, organisations) d'un texte."
    exemples:
      - label: "Contrat"
        input: "Le contrat est signé entre Martin Dubois, domicilié à Lyon, et la société Artisans du Bâtiment SARL, représentée par Sophie Laurent."
      - label: "Compte-rendu RH"
        input: "Julie Petit rejoindra l'équipe de Marseille le 1er septembre, sous la responsabilité de Karim Benali, directeur régional chez Toiture Plus."
  statut: disponible

- id: camembert-qa
  nom: "CamemBERT Question-Réponse"
  famille: question_reponse
  secteur: Support client / documentation
  moteur: transformers
  moteur_ref: etalab-ia/camembert-base-squadFR-fquad-piaf
  taille: "110 millions de paramètres"
  description_pedagogique: >
    Un modèle de question-réponse extractive : il ne invente pas de réponse, il repère le
    passage exact d'un texte de référence qui répond à la question posée. Très différent
    d'un LLM qui, lui, reformule et peut inventer — ici la réponse est toujours un extrait
    vérifiable du contexte fourni.
  cas_usage:
    enonce: "Répondre à une question en repérant le passage exact dans un texte de référence."
    exemples:
      - label: "Conditions de garantie"
        input: "Contexte : La garantie couvre les défauts de matériaux pendant 2 ans à compter de la date d'achat. Elle ne couvre pas les dommages causés par une mauvaise utilisation. Question : Combien de temps dure la garantie ?"
      - label: "Horaires"
        input: "Contexte : Le service client est joignable du lundi au vendredi de 9h à 18h, sauf les jours fériés. Le samedi, seul le support en ligne est disponible. Question : Le service client répond-il le samedi ?"
  statut: disponible

- id: fasttext-langue
  nom: "py3langid — détection de langue"
  famille: detection_langue
  secteur: Modération / routage multilingue
  moteur: py3langid
  moteur_ref: py3langid (modèle statistique embarqué, ~14 Mo)
  taille: "quelques Mo (pas un LLM)"
  description_pedagogique: >
    L'exemple parfait qu'"IA" ne veut pas dire "gros modèle génératif" : ce modèle tient
    en quelques mégaoctets et répond en quelques millisecondes. Il sert à détecter la
    langue d'un texte, une brique utile avant de router vers le bon modèle spécialisé.
  cas_usage:
    enonce: "Détecter automatiquement la langue d'un message reçu."
    exemples:
      - label: "Espagnol"
        input: "Hola, quisiera saber el estado de mi pedido."
      - label: "Anglais"
        input: "Hi, could you please send me an update on my order?"
      - label: "Allemand"
        input: "Guten Tag, wann wird meine Bestellung geliefert?"
  statut: disponible

- id: yolo-vision
  nom: "YOLOv8 (détection, nano)"
  famille: vision_detection
  secteur: Agriculture / Drone — détection depuis une vue aérienne
  moteur: ultralytics
  moteur_ref: yolov8n.pt
  taille: "3.2 millions de paramètres"
  description_pedagogique: >
    Un modèle de vision par ordinateur : il ne lit pas du texte mais une image, et localise
    des objets avec un rectangle (bounding box) + une étiquette. Base des usages "drone"
    (repérage de personnes/véhicules) ou "agriculture" (comptage, détection sur une parcelle).
  cas_usage:
    enonce: "Détecter et localiser les objets visibles sur une image d'exemple fournie par l'outil."
    exemples: []
  statut: disponible

- id: yolo-classification
  nom: "YOLOv8 (classification, nano)"
  famille: vision_classification
  secteur: Agriculture — identification visuelle
  moteur: ultralytics
  moteur_ref: yolov8n-cls.pt
  taille: "3 millions de paramètres"
  description_pedagogique: >
    Même famille d'algorithme que YOLOv8 détection, mais une tâche différente : ici le
    modèle ne localise rien, il attribue une seule étiquette à l'image entière. C'est la
    distinction "détection" (où sont les objets ?) vs "classification" (à quoi ressemble
    cette image ?) — deux tâches de vision très différentes en pratique.
  cas_usage:
    enonce: "Classer l'image d'exemple parmi 1000 catégories génériques (modèle non spécialisé agriculture, à titre pédagogique)."
    exemples: []
  statut: disponible

- id: whisper-transcription
