    (+ le tokenizer associé). Les poids sont téléchargés automatiquement au premier lancement et mis en
    cache localement (~/.cache/huggingface).
- id: barthez-resume
  nom: T5 (résumé automatique FR)
  famille: resume_automatique
  secteur: Presse / veille documentaire
  moteur: transformers
  moteur_ref: plguillou/t5-base-fr-sum-cnndm
  taille: 220 millions de paramètres
  description_pedagogique: 'Comme la traduction, le résumé est une tâche "texte vers texte" : le modèle
    lit un texte long et en génère un plus court qui garde l''essentiel. Ce modèle est un T5 (même famille
    d''architecture que beaucoup de LLM actuels) fine-tuné spécifiquement sur des articles de presse français
    pour cette tâche.

    '
  cas_usage:
    enonce: Résumer un texte en une ou deux phrases.
    exemples:
    - label: Article économique
      input: L'entreprise a annoncé une hausse de 12% de son chiffre d'affaires au troisième trimestre,
        portée par les ventes en ligne. La direction évoque un contexte favorable malgré l'inflation,
        et prévoit d'ouvrir 5 nouveaux points de vente en région parisienne d'ici la fin de l'année. Les
        syndicats restent toutefois prudents sur les créations d'emplois annoncées.
    - label: Compte-rendu de réunion
      input: Lors de la réunion du 12 juin, l'équipe a validé le nouveau planning de livraison pour le
        chantier de la rue des Lilas. Le retard de trois semaines sur le gros œuvre a été discuté et un
        plan de rattrapage a été proposé, avec un renfort d'équipe à partir du 20 juin. Le client a été
        informé et a accepté le nouveau délai.
    - label: Compte-rendu de comité de direction
      input: Le comité de direction s'est réuni ce mardi pour faire le point sur le lancement du nouveau
        produit prévu en octobre. Les retours des tests utilisateurs sont globalement positifs, même si
        certains bugs mineurs restent à corriger avant la mise en production. Le budget marketing a été
        revu à la hausse de 8% pour accompagner le lancement, et une campagne sur les réseaux sociaux
        débutera dès la première semaine de septembre. La direction a également annoncé le recrutement
        de deux personnes supplémentaires pour renforcer l'équipe support.
    - label: Article scientifique de vulgarisation
      input: Une équipe de chercheurs a mis au point une nouvelle méthode de recyclage des batteries lithium-ion
        permettant de récupérer plus de 95% des métaux critiques comme le cobalt et le nickel. Le procédé,
        testé à échelle pilote depuis un an, consomme deux fois moins d'énergie que les techniques industrielles
        actuelles. Les auteurs estiment qu'une industrialisation pourrait voir le jour d'ici trois à cinq
        ans si les investissements suivent. Plusieurs constructeurs automobiles ont déjà manifesté leur
        intérêt pour cette technologie.
    idees_usage:
    - Condenser un compte-rendu de comité de direction en quelques lignes pour les collaborateurs absents.
    - Résumer automatiquement de longs rapports d'incident pour un tableau de bord de suivi qualité.
    - Produire un résumé rapide d'articles scientifiques pour une veille technologique hebdomadaire.
    - Synthétiser les échanges d'un long fil d'emails avant transfert à un nouveau responsable de dossier.
    - Générer un résumé express de décisions de justice pour un cabinet d'avocats surchargé.
  statut: disponible
  lien_telechargement: https://huggingface.co/plguillou/t5-base-fr-sum-cnndm
  mode_emploi: 'pip install transformers torch, puis charger avec `AutoModelForSeq2SeqLM (préfixer le
    texte par "summarize: ").from_pretrained("plguillou/t5-base-fr-sum-cnndm")` (+ le tokenizer associé).
    Les poids sont téléchargés automatiquement au premier lancement et mis en cache localement (~/.cache/huggingface).'
- id: camembert-ner
