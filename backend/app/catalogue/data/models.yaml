- id: minilm-embeddings
  nom: "All-MiniLM"
  famille: embeddings
  secteur: Recherche sémantique (le plus petit du catalogue)
  moteur: ollama
  moteur_ref: all-minilm
  taille: "23 millions de paramètres"
  description_pedagogique: >
    Le plus petit modèle d'embeddings du catalogue — à comparer avec Nomic Embed (137M)
    et Mxbai Embed (335M) sur la même paire de phrases : un score de similarité correct
    ne nécessite pas forcément un gros modèle, mais la finesse de la représentation peut
    varier sur des cas plus subtils.
  cas_usage:
    enonce: "Comparer le score de similarité avec Nomic Embed et Mxbai Embed sur la même paire de phrases."
    exemples:
      - label: "Synonymes"
        input: "Phrase A: le chat dort sur le canapé. Phrase B: un félin fait la sieste sur le sofa."
      - label: "Sens opposé"
        input: "Phrase A: le client est très satisfait du service. Phrase B: le client est furieux et veut être remboursé."
  statut: disponible

