services:
  iaeasy:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: iaeasy
    restart: unless-stopped
    environment:
      - OLLAMA_URL=http://ollama:11434
      - IAEASY_DATA_DIR=/data
      - IAEASY_ADMIN_PASSWORD=${IAEASY_ADMIN_PASSWORD}
      - HF_HOME=/data/hf_cache
    volumes:
      - iaeasy_data:/data
      - ./backend/app:/app/app:ro
    networks:
      - proxy-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  proxy-net:
    external: true

volumes:
  iaeasy_data:
